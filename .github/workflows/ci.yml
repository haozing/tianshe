name: Open CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: typecheck, lint, test, audit, build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Open edition tests
        run: npm run test:open:full

      - name: Security audit
        run: npm audit --registry=https://registry.npmjs.org --audit-level=high --omit=dev

      - name: Open source boundary
        run: npm run verify:open-source-boundary

      - name: Coverage smoke
        run: >
          npx vitest run --coverage
          --coverage.include=src/main/ipc-authorization.ts
          --coverage.include=src/utils/redaction.ts
          --coverage.include=src/utils/zip-safety.ts
          --coverage.include=src/core/js-plugin/trust-policy.ts
          src/main/ipc-authorization.test.ts
          src/utils/redaction.test.ts
          src/utils/zip-safety.test.ts
          src/core/js-plugin/trust-policy.test.ts

      - name: Open build
        run: npm run build:open
