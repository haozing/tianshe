name: Feature request
description: Suggest an improvement for the open Tianshe client.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Tianshe do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop UI
        - Dataset workflows
        - Browser automation
        - Plugin runtime
        - HTTP / MCP
        - Observability
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What other approaches did you consider?
  - type: checkboxes
    id: boundary
    attributes:
      label: Open edition boundary
      options:
        - label: This request does not require adding private cloud endpoints, private auth flows, or hosted plugin catalog behavior to the open repository.
          required: true
